<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AC Marketplace</h1>
        <nav>
            <button id="show-login">Login</button>
            <button id="show-register">Register</button>
            <button id="show-browse" class="secondary">View/Search Ads</button>
            <button id="logout" class="hidden">Logout</button>
        </nav>
    </header>
    <main>
        <section class="content landing-panel" id="landing-panel">
            <h2>Welcome to AC Marketplace</h2>
            <p>Explore public ads or sign in to manage your account and post items.</p>
            <div class="landing-actions">
                <button id="landing-browse" class="secondary">Browse Public Posts</button>
                <button id="landing-account">View My Account</button>
            </div>
        </section>

        <section class="content auth-panel hidden" id="auth-panel">
            <button id="back-to-landing-auth" class="secondary">Back to Home</button>
            <div id="auth-message" class="message"></div>
            <div id="login-form" class="auth-form hidden">
                <h2>Login</h2>
                <label>
                    Username
                    <input type="text" id="login-username" placeholder="Enter username">
                </label>
                <label>
                    Password
                    <input type="password" id="login-password" placeholder="Enter password">
                </label>
                <button id="login-button">Login</button>
            </div>
            <div id="register-form" class="auth-form hidden">
                <h2>Register</h2>
                <label>
                    Username
                    <input type="text" id="register-username" placeholder="Choose a username">
                </label>
                <label>
                    Password
                    <input type="password" id="register-password" placeholder="Choose a password">
                </label>
                <button id="register-button">Create Account</button>
            </div>
        </section>

        <section class="content marketplace-panel hidden" id="marketplace-panel">
            <div class="marketplace-header">
                <div>
                    <h2>Marketplace</h2>
                    <p id="current-user"></p>
                    <p id="browse-note">You can browse ads without logging in. Sign in to post your own.</p>
                </div>
                <div class="marketplace-actions">
                    <button id="back-to-landing-marketplace" class="secondary">Back to Home</button>
                    <button id="show-post-form">Post New Ad</button>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search ads by title, description, price, seller, university">
                <button id="search-button">Search</button>
                <button id="clear-search" class="secondary">Clear</button>
            </div>
            <div id="post-ad-form" class="post-form hidden">
                <h3>Post an item</h3>
                <label>
                    Item title
                    <input type="text" id="item-title" placeholder="Example: Vintage lamp">
                </label>
                <label>
                    Price
                    <input type="text" id="item-price" placeholder="$25">
                </label>
                <label>
                    Description
                    <textarea id="item-description" rows="4" placeholder="Describe the item..."></textarea>
                </label>
                <label>
                    Location
                    <input type="text" id="item-location" placeholder="City or pickup area">
                </label>
                <label>
                    University
                    <select id="item-university">
                        <option value="">Select university</option>
                        <option value="University of Toronto">University of Toronto</option>
                        <option value="McGill University">McGill University</option>
                        <option value="University of British Columbia">University of British Columbia</option>
                        <option value="McMaster University">McMaster University</option>
                        <option value="Université de Montréal">Université de Montréal</option>
                        <option value="University of Alberta">University of Alberta</option>
                        <option value="University of Waterloo">University of Waterloo</option>
                        <option value="Western University">Western University</option>
                        <option value="University of Calgary">University of Calgary</option>
                        <option value="Queen's University">Queen's University</option>
                        <option value="University of Ottawa">University of Ottawa</option>
                        <option value="Simon Fraser University">Simon Fraser University</option>
                        <option value="Dalhousie University">Dalhousie University</option>
                        <option value="University of Saskatchewan">University of Saskatchewan</option>
                        <option value="Université de Sherbrooke">Université de Sherbrooke</option>
                        <option value="York University">York University</option>
                        <option value="University of Guelph">University of Guelph</option>
                        <option value="Concordia University">Concordia University</option>
                        <option value="University of Victoria">University of Victoria</option>
                        <option value="University of Manitoba">University of Manitoba</option>
                        <option value="Carleton University">Carleton University</option>
                        <option value="Memorial University of Newfoundland">Memorial University of Newfoundland</option>
                        <option value="Ontario Tech University">Ontario Tech University</option>
                        <option value="Toronto Metropolitan University">Toronto Metropolitan University</option>
                        <option value="University of Windsor">University of Windsor</option>
                        <option value="Brock University">Brock University</option>
                        <option value="University of Regina">University of Regina</option>
                        <option value="University of New Brunswick">University of New Brunswick</option>
                        <option value="St. Francis Xavier University">St. Francis Xavier University</option>
                        <option value="Lakehead University">Lakehead University</option>
                        <option value="Laurentian University">Laurentian University</option>
                        <option value="Wilfrid Laurier University">Wilfrid Laurier University</option>
                        <option value="University of Prince Edward Island">University of Prince Edward Island</option>
                        <option value="Trent University">Trent University</option>
                        <option value="Vancouver Island University">Vancouver Island University</option>
                        <option value="Athabasca University">Athabasca University</option>
                        <option value="Mount Allison University">Mount Allison University</option>
                        <option value="University of Lethbridge">University of Lethbridge</option>
                        <option value="Thompson Rivers University">Thompson Rivers University</option>
                        <option value="University of Northern British Columbia">University of Northern British Columbia</option>
                        <option value="OCAD University">OCAD University</option>
                        <option value="Bishop's University">Bishop's University</option>
                        <option value="University of Winnipeg">University of Winnipeg</option>
                        <option value="Redeemer University">Redeemer University</option>
                        <option value="Université Laval">Université Laval</option>
                        <option value="Université du Québec à Montréal">Université du Québec à Montréal</option>
                        <option value="Université du Québec à Trois-Rivières">Université du Québec à Trois-Rivières</option>
                        <option value="Université du Québec à Chicoutimi">Université du Québec à Chicoutimi</option>
                        <option value="Royal Roads University">Royal Roads University</option>
                        <option value="Nipissing University">Nipissing University</option>
                    </select>
                </label>
                <label>
                    Image
                    <input type="file" id="item-image" accept="image/*">
                </label>
                <button id="post-ad-button">Submit Ad</button>
            </div>
            <div class="ads-list">
                <h3>Active Listings</h3>
                <div id="ads-container"></div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 AC Marketplace. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
